<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplayer Card Game</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .grid-container { max-height: 55vh; overflow-y: auto; }
    </style>
</head>
<body class="bg-slate-900 text-white font-sans select-none p-4">

    <div class="text-center my-2">
        <h1 class="text-xl font-bold text-amber-400">Telegram Mini-Game</h1>
        <div id="status-banner" class="mt-2 text-lg bg-slate-800 p-2 rounded-lg font-semibold tracking-wide">
            Loading game status...
        </div>
    </div>

    <main class="mt-4">
        <div id="card-grid" class="grid-container grid grid-cols-5 gap-2 p-1 bg-slate-800/50 rounded-xl border border-slate-700">
            </div>
    </main>

    <script>
        // Connected directly to your PythonAnywhere server
        const BACKEND_URL = "https://Bdej.pythonanywhere.com"; 
        
        // Generate a random mock ID for this mobile session
        const myUserId = "Player_" + Math.floor(Math.random() * 9000 + 1000);
        let currentChoice = null;

        // Create 1-200 Cards
        const grid = document.getElementById('card-grid');
        for (let i = 1; i <= 200; i++) {
            const btn = document.createElement('button');
            btn.id = `card-${i}`;
            btn.innerText = i;
            btn.className = "p-3 bg-slate-700 hover:bg-slate-600 active:bg-amber-500 font-bold rounded-lg transition-all text-center";
            btn.onclick = () => selectCard(i);
            grid.appendChild(btn);
        }

        async function selectCard(num) {
            if (currentChoice !== null) return; // Prevent picking multiple
            currentChoice = num;
            
            // Instantly reveal choice visually on phone
            const btn = document.getElementById(`card-${num}`);
            btn.className = "p-3 bg-amber-500 text-slate-950 font-black rounded-lg scale-105 ring-4 ring-amber-300";

            // Tell your Python server
            try {
                await fetch(`${BACKEND_URL}/select`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ userId: myUserId, card: num })
                });
            } catch (err) { console.error("Error sending selection", err); }
        }

        // Loop execution: Ask Python for room status every 1 second
        async function updateGameStatus() {
            try {
                const res = await fetch(`${BACKEND_URL}/status`);
                const data = await res.json();
                const banner = document.getElementById('status-banner');

                if (data.status === "SELECTING") {
                    banner.innerHTML = `🟢 Select a Card! (${data.players_joined} joined)`;
                    if (currentChoice === null) resetGridUI();
                } 
                else if (data.status === "COUNTDOWN") {
                    banner.innerHTML = `⏳ Game starts in: <span class="text-amber-400 font-bold text-xl">${data.timer}s</span>`;
                } 
                else if (data.status === "REVEAL") {
                    banner.innerHTML = `🎉 Winner Card: <span class="text-green-400 font-black text-2xl">${data.winner_card}</span> <br><small class="text-xs text-slate-400">Restarting in ${data.reset_timer}s</small>`;
                    highlightWinner(data.winner_card);
                }
            } catch (e) {
                document.getElementById('status-banner').innerText = "Connecting to game room...";
            }
        }

        function resetGridUI() {
            for (let i = 1; i <= 200; i++) {
                const btn = document.getElementById(`card-${i}`);
                btn.className = "p-3 bg-slate-700 font-bold rounded-lg text-center text-white";
                btn.disabled = false;
            }
            currentChoice = null;
        }

        function highlightWinner(winningNum) {
            for (let i = 1; i <= 200; i++) {
                const btn = document.getElementById(`card-${i}`);
                btn.disabled = true;
                if (i === winningNum) {
                    btn.className = "p-3 bg-green-500 text-slate-950 font-black rounded-lg scale-110 animate-bounce";
                } else {
                    btn.className = "p-3 bg-slate-800 text-slate-600 font-bold rounded-lg line-through opacity-30";
                }
            }
        }

        // Call the server loop continuously every second
        setInterval(updateGameStatus, 1000);
    </script>
</body>
</html>
